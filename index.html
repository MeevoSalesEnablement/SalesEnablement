document.getElementById("globalSearch").addEventListener("input",function(){

  var sr=document.getElementById("searchResults");

  var main=document.getElementById("main");
  if(q.length<2){sr.style.display="none";tabs.style.display="flex";main.style.display="block";return}
  var matches=REPS.filter(function(r){return r.n.toLowerCase().indexOf(q)>=0});

});
