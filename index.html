var h='<div class="st"><div class="sc"><div class="sv">'+allEmp().length+'</div><div class="sl">Employees</div></div><div class="sc"><div class="sv">'+C.length+'</div><div class="sl">Sales Modules</div></div><div class="sc"><div class="sv">'+P.length+'</div><div class="sl">Product Modules</div></div></div>';
emps.forEach(function(x){var tot=x.c.length+x.p.length;var all=C.length+P.length;var pct=Math.round(tot/all*100);var emp=E.find(function(z){return z.n===x.n});
h+='<div class="ec"><div style="display:flex;align-items:center;gap:14px;margin-bottom:12px">'+av(x.n,42)+'<div><div style="font-size:18px;font-weight:700;color:#1a6b54">'+x.n+'</div><div style="font-size:12px;color:#5a6b7a">'+tot+'/'+all+' modules ('+pct+'%)'+(emp?' · <b>'+emp.r+'</b>':'')+(emp&&emp.sd?' · Started: '+emp.sd:'')+(emp&&emp.mg?' · Manager: '+emp.mg:'')+'</div></div></div>';
h+='<div class="pb"><div class="pf" style="width:'+pct+'%"></div></div>';
h+='<div style="margin-top:16px;font-size:12px;font-weight:700;color:#1a6b54;margin-bottom:8px">Sales Enablement ('+x.c.length+'/'+C.length+')</div>';
C.forEach(function(c){var d=x.c.find(function(z){return z.id===c.id});h+='<div class="er"><div class="en" style="background:'+(d?"#1a6b54":"#c5ced6")+'">'+c.id+'</div><div style="flex:1;font-size:12px;color:'+(d?"#1e2b35":"#8494a2")+'">'+c.ti+'</div><div style="font-size:11px;color:'+(d?"#1a6b54":"#b0bcc6")+';font-weight:600">'+(d?"\u2713 "+(d.dt||"Done"):"—")+'</div></div>'});
h+='<div style="margin-top:16px;font-size:12px;font-weight:700;color:#7c3aed;margin-bottom:8px">Product Training ('+x.p.length+'/'+P.length+')</div>';
P.forEach(function(c){var d=x.p.find(function(z){return z.id===c.id});h+='<div class="er"><div class="en" style="background:'+(d?"#7c3aed":"#c5ced6")+'">P'+c.id+'</div><div style="flex:1;font-size:12px;color:'+(d?"#1e2b35":"#8494a2")+'">'+c.ti+'</div><div style="font-size:11px;color:'+(d?"#7c3aed":"#b0bcc6")+';font-weight:600">'+(d?"\u2713 "+(d.dt||"Done"):"—")+'</div></div>'});
h+='</div>'});
if(!emps.length)h+='<div class="emp">No employees found.</div>';return h}

function rRoster(){var q=document.getElementById("search").value.trim().toLowerCase();var fl=E.filter(function(x){if(q.length>=2)return x.n.toLowerCase().indexOf(q)>=0||x.r.toLowerCase().indexOf(q)>=0||(x.mg||"").toLowerCase().indexOf(q)>=0;return true});
var rc={SDR:0,AE:0,SE:0};E.forEach(function(x){if(rc[x.r]!==undefined)rc[x.r]++});
var h='<div class="st"><div class="sc"><div class="sv">'+E.length+'</div><div class="sl">Total</div></div><div class="sc"><div class="sv">'+rc.SDR+'</div><div class="sl">SDRs</div></div><div class="sc"><div class="sv">'+rc.AE+'</div><div class="sl">AEs</div></div><div class="sc"><div class="sv">'+rc.SE+'</div><div class="sl">SEs</div></div></div>';
h+='<div style="margin-bottom:16px"><button class="bt bg" onclick="addE()">+ Add New Employee</button></div>';
h+='<div style="background:#fff;border-radius:14px;border:1px solid #c5ced6;overflow:hidden"><table><thead><tr><th>Employee</th><th style="width:60px">Role</th><th style="width:90px">Start Date</th><th style="width:120px">Manager</th><th style="width:90px">Progress</th><th style="width:70px">Actions</th></tr></thead><tbody>';
fl.forEach(function(x,i){var idx=E.indexOf(x);var emp=allEmp().find(function(z){return z.n===x.n});var dn=(emp?emp.c.length+emp.p.length:0);var all=C.length+P.length;var pct=Math.round(dn/all*100);var rb=x.r==="SDR"?"#2563a8":x.r==="AE"?"#1a6b54":"#7c3aed";
h+='<tr><td><div style="display:flex;align-items:center;gap:10px">'+av(x.n,30)+'<div style="font-weight:600;font-size:13px;color:#1e2b35">'+x.n+'</div></div></td><td><span class="f" style="background:'+rb+'">'+x.r+'</span></td><td style="font-size:12px;color:#4a5968">'+(x.sd||"—")+'</td><td style="font-size:12px;color:#4a5968">'+(x.mg||"—")+'</td><td><div style="display:flex;align-items:center;gap:6px"><div class="pb" style="width:50px"><div class="pf" style="width:'+pct+'%;background:'+(pct>=80?"#1a6b54":pct>=40?"#c4880d":"#b83b3b")+'"></div></div><span style="font-size:11px;font-weight:600;color:'+(pct>=80?"#1a6b54":pct>=40?"#c4880d":"#b83b3b")+'">'+pct+'%</span></div></td><td><button class="bt bo bs" onclick="edE('+idx+')">Edit</button> <button class="bt br bs" onclick="dlE('+idx+')">×</button></td></tr>'});
h+='</tbody></table></div>';return h}

function rEmpProfile(nm){
var emp=E.find(function(x){return x.n===nm});
var ae=allEmp().find(function(x){return x.n===nm});
if(!ae)return'';
var tot=ae.c.length+ae.p.length;var all=C.length+P.length;var pct=Math.round(tot/all*100);
var h='<div class="ec" style="border-left:4px solid #1a6b54"><div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">'+av(nm,48)+'<div><div style="font-size:20px;font-weight:700;color:#1a6b54">'+nm+'</div><div style="font-size:12px;color:#5a6b7a">'+tot+'/'+all+' modules completed ('+pct+'%)'+(emp?' · <b>'+emp.r+'</b>':'')+(emp&&emp.sd?' · Started: '+emp.sd:'')+(emp&&emp.mg?' · Manager: '+emp.mg:'')+'</div></div></div>';
h+='<div class="pb" style="height:10px"><div class="pf" style="width:'+pct+'%"></div></div>';
h+='<div style="margin-top:20px;font-size:13px;font-weight:700;color:#1a6b54;margin-bottom:10px">Sales Enablement Modules ('+ae.c.length+'/'+C.length+')</div>';
C.forEach(function(c){var d=ae.c.find(function(z){return z.id===c.id});h+='<div class="er"><div class="en" style="background:'+(d?"#1a6b54":"#c5ced6")+'">'+c.id+'</div><div style="flex:1;font-size:12px;color:'+(d?"#1e2b35":"#8494a2")+'">'+c.ti+'</div><div style="font-size:11px;color:'+(d?"#1a6b54":"#b83b3b")+';font-weight:600">'+(d?"\u2713 "+d.dt:"Not completed")+'</div></div>'});
h+='<div style="margin-top:20px;font-size:13px;font-weight:700;color:#7c3aed;margin-bottom:10px">Product Training ('+ae.p.length+'/'+P.length+')</div>';
P.forEach(function(c){var d=ae.p.find(function(z){return z.id===c.id});h+='<div class="er"><div class="en" style="background:'+(d?"#7c3aed":"#c5ced6")+'">P'+c.id+'</div><div style="flex:1;font-size:12px;color:'+(d?"#1e2b35":"#8494a2")+'">'+c.ti+'</div><div style="font-size:11px;color:'+(d?"#7c3aed":"#b83b3b")+';font-weight:600">'+(d?"\u2713 "+d.dt:"Not completed")+'</div></div>'});
h+='</div>';return h}

// RENDER
function render(){rNav();rTabs();var m=document.getElementById("main");
var q=document.getElementById("search").value.trim().toLowerCase();
// Check if search matches an employee name
if(q.length>=2){
var empMatches=allEmp().filter(function(x){return x.n.toLowerCase().indexOf(q)>=0});
if(empMatches.length>0&&empMatches.length<=5){
var h='<div style="font-size:13px;color:#6b7a88;margin-bottom:16px">Showing employee profiles matching "'+q+'"<span style="margin-left:12px;font-size:11px;color:#8494a2;cursor:pointer" onclick="document.getElementById(\'search\').value=\'\';render()">✕ Clear search</span></div>';
empMatches.forEach(function(x){h+=rEmpProfile(x.n)});
m.innerHTML=h;return;
}
}
if(V==="schedule")m.innerHTML=rSched();else if(V==="courses")m.innerHTML=rCourses();else if(V==="product")m.innerHTML=rProduct();else if(V==="employees")m.innerHTML=rEmps();else if(V==="roster")m.innerHTML=rRoster()}

function tog(id){var el=document.getElementById(id);if(el)el.classList.toggle("op")}

// MODALS
function modal(h){document.getElementById("mw").innerHTML='<div class="mbg" onclick="if(event.target===this)clM()"><div class="mdl" onclick="event.stopPropagation()">'+h+'</div></div>';document.getElementById("mw").style.display="block"}
function clM(){document.getElementById("mw").style.display="none"}

// SCHEDULE CRUD
var sIdx=null;
function addS(){sIdx=null;sModal({w:cW||1,d:1,s:"",e:"",du:"",t:"",f:"Proctored",dp:"SALES",fc:"",lk:""})}
function edS(i){sIdx=i;sModal(JSON.parse(JSON.stringify(S[i])))}
function sModal(x){var h='<h2>'+(sIdx!==null?"Edit":"Add")+' Session</h2><div class="fr"><div class="fg"><label>Week</label><select id="xw"><option value="1"'+(x.w===1?" selected":"")+'>1</option><option value="2"'+(x.w===2?" selected":"")+'>2</option><option value="3"'+(x.w===3?" selected":"")+'>3</option></select></div><div class="fg"><label>Day</label><select id="xd">';for(var i=1;i<=15;i++)h+='<option value="'+i+'"'+(x.d===i?" selected":"")+'>'+i+'</option>';h+='</select></div><div class="fg"><label>Duration</label><input id="xdu" value="'+x.du+'"/></div></div><div class="fr"><div class="fg"><label>Start</label><input id="xs" value="'+x.s+'"/></div><div class="fg"><label>End</label><input id="xe" value="'+x.e+'"/></div><div class="fg"><label>Format</label><select id="xf"><option>Proctored</option><option>Self-Guided</option><option>Meeting</option><option>Practice</option><option>Assessment</option><option>Break</option><option>Social</option></select></div></div><div class="fg"><label>Topic</label><input id="xt" value="'+(x.t||"").replace(/"/g,"&quot;")+'"/></div><div class="fr"><div class="fg"><label>Dept</label><input id="xdp" value="'+x.dp+'"/></div><div class="fg"><label>Facilitator</label><input id="xfc" value="'+x.fc+'"/></div><div class="fg"><label>Link</label><input id="xlk" value="'+(x.lk||"")+'"/></div></div><div style="display:flex;gap:8px;margin-top:16px"><button class="bt bg" onclick="svS()">Save</button><button class="bt bo" onclick="clM()">Cancel</button></div>';modal(h);setTimeout(function(){document.getElementById("xf").value=x.f},10)}
function svS(){var o={w:+document.getElementById("xw").value,d:+document.getElementById("xd").value,s:document.getElementById("xs").value,e:document.getElementById("xe").value,du:document.getElementById("xdu").value,t:document.getElementById("xt").value,f:document.getElementById("xf").value,dp:document.getElementById("xdp").value,fc:document.getElementById("xfc").value,lk:document.getElementById("xlk").value};if(!o.t){alert("Enter topic.");return}if(sIdx!==null)S[sIdx]=o;else S.push(o);save();clM();render()}
function dlS(i){if(confirm("Delete: "+S[i].t+"?")){S.splice(i,1);save();render()}}

// COURSE ATTENDANCE CRUD
function addCA(){var h='<h2>Add Sales Module Attendance</h2><div class="fg"><label>Module</label><select id="xci">';C.forEach(function(c){h+='<option value="'+c.id+'">'+c.id+'. '+c.ti+'</option>'});h+='</select></div><div class="fr2"><div class="fg"><label>Employee Name</label><input id="xcn" placeholder="e.g. Kenny Sullivan"/></div><div class="fg"><label>Date</label><input id="xcd" placeholder="e.g. 4/14/2026"/></div></div><div style="display:flex;gap:8px;margin-top:16px"><button class="bt bg" onclick="svCA()">Save</button><button class="bt bo" onclick="clM()">Cancel</button></div>';modal(h)}
function svCA(){var id=+document.getElementById("xci").value,n=document.getElementById("xcn").value.trim(),d=document.getElementById("xcd").value.trim();if(!n){alert("Enter name.");return}var c=C.find(function(x){return x.id===id});if(c){c.at.push({n:n,dt:d});save();clM();render()}}
function dlCA(cid,ai){var c=C.find(function(x){return x.id===cid});if(c&&confirm("Remove "+c.at[ai].n+"?")){c.at.splice(ai,1);save();render()}}

// PRODUCT ATTENDANCE CRUD
function addPA(){var h='<h2>Add Product Training Attendance</h2><div class="fg"><label>Module</label><select id="xpi">';P.forEach(function(c){h+='<option value="'+c.id+'">P'+c.id+'. '+c.ti+'</option>'});h+='</select></div><div class="fr2"><div class="fg"><label>Employee Name</label><input id="xpn" placeholder="e.g. Kenny Sullivan"/></div><div class="fg"><label>Date</label><input id="xpd" placeholder="e.g. 4/14/2026"/></div></div><div style="display:flex;gap:8px;margin-top:16px"><button class="bt bg" onclick="svPA()">Save</button><button class="bt bo" onclick="clM()">Cancel</button></div>';modal(h)}
function svPA(){var id=+document.getElementById("xpi").value,n=document.getElementById("xpn").value.trim(),d=document.getElementById("xpd").value.trim();if(!n){alert("Enter name.");return}var c=P.find(function(x){return x.id===id});if(c){c.at.push({n:n,dt:d});save();clM();render()}}
function dlPA(cid,ai){var c=P.find(function(x){return x.id===cid});if(c&&confirm("Remove "+c.at[ai].n+"?")){c.at.splice(ai,1);save();render()}}

// EMPLOYEE CRUD
var eIdx=null;
function addE(){eIdx=null;eModal({n:"",r:"SDR",sd:"",mg:""})}
function edE(i){eIdx=i;eModal(JSON.parse(JSON.stringify(E[i])))}
function eModal(x){var h='<h2>'+(eIdx!==null?"Edit":"Add")+' Employee</h2><div class="fg"><label>Full Name</label><input id="en" value="'+(x.n||"").replace(/"/g,"&quot;")+'"/></div><div class="fr"><div class="fg"><label>Role</label><select id="er"><option value="SDR"'+(x.r==="SDR"?" selected":"")+'>SDR</option><option value="AE"'+(x.r==="AE"?" selected":"")+'>AE</option><option value="SE"'+(x.r==="SE"?" selected":"")+'>SE</option></select></div><div class="fg"><label>Start Date</label><input id="esd" value="'+(x.sd||"")+'"/></div><div class="fg"><label>Manager</label><input id="emg" value="'+(x.mg||"")+'"/></div></div><div style="display:flex;gap:8px;margin-top:16px"><button class="bt bg" onclick="svE()">Save</button><button class="bt bo" onclick="clM()">Cancel</button></div>';modal(h)}
function svE(){var n=document.getElementById("en").value.trim(),r=document.getElementById("er").value,sd=document.getElementById("esd").value.trim(),mg=document.getElementById("emg").value.trim();if(!n){alert("Enter name.");return}if(eIdx!==null){E[eIdx]={n:n,r:r,sd:sd,mg:mg}}else{E.push({n:n,r:r,sd:sd,mg:mg})}save();clM();render()}
function dlE(i){if(confirm("Remove "+E[i].n+"?")){E.splice(i,1);save();render()}}

document.getElementById("search").addEventListener("input",function(){render()});
load();render();
</script>
